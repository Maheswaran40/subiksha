<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1>Welcome to Home page</h1>
    <button class="btn btn-info" data-bs-toggle="offcanvas" data-bs-target="#searchCanvas">Search</button>
    <!--all products -->
    <div class="row" id="allproduct"></div>

    <!-- search canvas -->
    <div class="offcanvas offcanvas-top" id="searchCanvas" style="height: 500px;">
        <div class="offcanvas-header"><h2>search</h2><button class="btn btn-close" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body">
            <form class="input-group"  onsubmit="searchFun(event)">
                <input type="search" placeholder="search" class="form-control" id="input">
                <input type="submit" class="btn btn-success">
            </form>
            <br>
            <div class="row" id="searchOutput">

            </div>
        </div>
    </div>





  </body>
  <script src="../scripts/Home.js"></script>
</html>
